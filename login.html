<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Connexion — V.A.L.E.U.R©</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --navy: #0a0f1a;
      --navy-mid: #111827;
      --navy-card: #1a2235;
      --navy-border: #2a3650;
      --gold: #c9a84c;
      --gold-dark: #a07830;
      --gold-light: #e8d08c;
      --cream: #f7f3ee;
      --text-light: #e2e8f0;
      --text-muted: #94a3b8;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--navy);
      color: var(--text-light);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      position: relative;
      overflow: hidden;
    }

    .ambient-light {
      position: fixed;
      width: 600px;
      height: 600px;
      border-radius: 50%;
      filter: blur(120px);
      opacity: 0.1;
      pointer-events: none;
      z-index: 0;
    }

    .ambient-1 {
      background: var(--gold);
      top: -200px;
      right: -200px;
      animation: float 20s ease-in-out infinite;
    }

    .ambient-2 {
      background: #8E44AD;
      bottom: -200px;
      left: -200px;
      animation: float 25s ease-in-out infinite 5s;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-30px); }
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes glow {
      0%, 100% { box-shadow: 0 0 30px rgba(201, 168, 76, 0.3); }
      50% { box-shadow: 0 0 50px rgba(201, 168, 76, 0.6); }
    }

    .login-container {
      position: relative;
      z-index: 10;
      width: 100%;
      max-width: 480px;
      animation: fadeIn 0.8s ease;
    }

    .login-card {
      background: linear-gradient(135deg, var(--navy-card), var(--navy-mid));
      border: 1px solid rgba(201, 168, 76, 0.2);
      border-radius: 24px;
      padding: 48px;
      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.6);
    }

    .logo {
      font-family: 'Cormorant Garamond', serif;
      font-size: 42px;
      font-weight: 700;
      color: var(--gold);
      text-align: center;
      letter-spacing: 4px;
      margin-bottom: 12px;
      text-shadow: 0 0 30px rgba(201, 168, 76, 0.4);
      animation: glow 3s ease-in-out infinite;
    }

    .subtitle {
      text-align: center;
      color: var(--text-muted);
      font-size: 16px;
      margin-bottom: 40px;
      line-height: 1.6;
    }

    .form-group {
      margin-bottom: 24px;
    }

    .form-label {
      display: block;
      font-size: 14px;
      font-weight: 600;
      color: var(--text-light);
      margin-bottom: 8px;
    }

    .form-input {
      width: 100%;
      background: rgba(10, 15, 26, 0.6);
      border: 1px solid var(--navy-border);
      border-radius: 12px;
      padding: 14px 18px;
      font-size: 15px;
      color: var(--text-light);
      font-family: 'Inter', sans-serif;
      transition: all 0.3s;
    }

    .form-input:focus {
      outline: none;
      border-color: var(--gold);
      background: rgba(10, 15, 26, 0.8);
      box-shadow: 0 0 0 3px rgba(201, 168, 76, 0.1);
    }

    .form-input::placeholder {
      color: var(--text-muted);
    }

    .btn-primary {
      width: 100%;
      background: linear-gradient(135deg, var(--gold), var(--gold-dark));
      color: #000;
      border: none;
      border-radius: 12px;
      padding: 16px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.3s;
      box-shadow: 0 8px 24px rgba(201, 168, 76, 0.3);
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 32px rgba(201, 168, 76, 0.5);
    }

    .btn-primary:active {
      transform: translateY(0);
    }

    .divider {
      display: flex;
      align-items: center;
      gap: 16px;
      margin: 32px 0;
      color: var(--text-muted);
      font-size: 14px;
    }

    .divider::before,
    .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--navy-border);
    }

    .toggle-mode {
      text-align: center;
      font-size: 14px;
      color: var(--text-muted);
    }

    .toggle-link {
      color: var(--gold);
      text-decoration: none;
      font-weight: 600;
      cursor: pointer;
      transition: color 0.2s;
    }

    .toggle-link:hover {
      color: var(--gold-light);
      text-decoration: underline;
    }

    .error-message {
      background: rgba(231, 76, 60, 0.1);
      border: 1px solid rgba(231, 76, 60, 0.3);
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 20px;
      color: #ff6b6b;
      font-size: 14px;
      display: none;
    }

    .error-message.show {
      display: block;
      animation: fadeIn 0.3s ease;
    }

    .success-message {
      background: rgba(46, 204, 113, 0.1);
      border: 1px solid rgba(46, 204, 113, 0.3);
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 20px;
      color: #2ecc71;
      font-size: 14px;
      display: none;
    }

    .success-message.show {
      display: block;
      animation: fadeIn 0.3s ease;
    }

    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: var(--text-muted);
      text-decoration: none;
      font-size: 14px;
      margin-top: 24px;
      transition: color 0.2s;
    }

    .back-link:hover {
      color: var(--gold);
    }

    @media (max-width: 480px) {
      .login-card {
        padding: 32px 24px;
      }

      .logo {
        font-size: 36px;
      }
    }
  </style>
</head>
<body>
  <div class="ambient-light ambient-1"></div>
  <div class="ambient-light ambient-2"></div>

  <div class="login-container">
    <div class="login-card">
      <h1 class="logo">V.A.L.E.U.R©</h1>
      <p class="subtitle">Accède à ton espace personnel pour commencer ta transformation</p>

      <div id="errorMsg" class="error-message"></div>
      <div id="successMsg" class="success-message"></div>

      <form id="loginForm">
        <div class="form-group">
          <label class="form-label" for="loginEmail">Email</label>
          <input 
            type="email" 
            id="loginEmail" 
            class="form-input" 
            placeholder="ton-email@exemple.com"
            required
          >
        </div>
        <div class="form-group">
          <label class="form-label" for="loginPassword">Mot de passe</label>
          <input 
            type="password" 
            id="loginPassword" 
            class="form-input" 
            placeholder="••••••••"
            required
          >
        </div>
        <button type="submit" class="btn-primary">Se connecter →</button>
      </form>

      <div class="divider">ou</div>

      <form id="signupForm" style="display: none;">
        <div class="form-group">
          <label class="form-label" for="signupName">Prénom</label>
          <input 
            type="text" 
            id="signupName" 
            class="form-input" 
            placeholder="Ton prénom"
            required
          >
        </div>
        <div class="form-group">
          <label class="form-label" for="signupEmail">Email</label>
          <input 
            type="email" 
            id="signupEmail" 
            class="form-input" 
            placeholder="ton-email@exemple.com"
            required
          >
        </div>
        <div class="form-group">
          <label class="form-label" for="signupPassword">Mot de passe</label>
          <input 
            type="password" 
            id="signupPassword" 
            class="form-input" 
            placeholder="Min. 8 caractères"
            required
            minlength="8"
          >
        </div>
        <button type="submit" class="btn-primary">Créer mon compte →</button>
      </form>

      <p class="toggle-mode">
        <span id="toggleText">Pas encore de compte ?</span>
        <a class="toggle-link" id="toggleLink">S’inscrire</a>
      </p>

      <a href="landing.html" class="back-link">
        ← Retour à l'accueil
      </a>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL = "https://ecetwkusxzbqoztokgtk.supabase.co";
    const SUPABASE_KEY = "sb_publishable_OAESsD6hq6D38azq6Pjxuw_28frwX6M";
    const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    const loginForm = document.getElementById('loginForm');
    const signupForm = document.getElementById('signupForm');
    const toggleLink = document.getElementById('toggleLink');
    const toggleText = document.getElementById('toggleText');
    const errorMsg = document.getElementById('errorMsg');
    const successMsg = document.getElementById('successMsg');

    let isLoginMode = true;

    toggleLink.addEventListener('click', () => {
      isLoginMode = !isLoginMode;
      
      if (isLoginMode) {
        loginForm.style.display = 'block';
        signupForm.style.display = 'none';
        toggleText.textContent = "Pas encore de compte ?";
        toggleLink.textContent = "S'inscrire";
      } else {
        loginForm.style.display = 'none';
        signupForm.style.display = 'block';
        toggleText.textContent = "Déjà un compte ?";
        toggleLink.textContent = "Se connecter";
      }
      
      hideMessages();
    });

    loginForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      hideMessages();

      const email = document.getElementById('loginEmail').value.trim();
      const password = document.getElementById('loginPassword').value;

      if (email && password.length >= 6) {
        localStorage.setItem('valeur_current_user', email);
        const name = localStorage.getItem(`valeur_${email}_name`) || email.split('@')[0];
        showSuccess('✓ Connexion réussie ! Redirection...');
        setTimeout(() => {
          window.location.href = 'index.html';
        }, 1000);
      } else {
        showError('Email ou mot de passe invalide.');
      }
    });

    signupForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      hideMessages();

      const name = document.getElementById('signupName').value.trim();
      const email = document.getElementById('signupEmail').value.trim();
      const password = document.getElementById('signupPassword').value;

      if (name && email && password.length >= 8) {
        localStorage.setItem('valeur_current_user', email);
        localStorage.setItem(`valeur_${email}_name`, name);
        localStorage.setItem(`valeur_${email}_progress`, JSON.stringify({
          completed: [],
          current: 0,
          lastActivity: new Date().toISOString()
        }));
        localStorage.setItem(`valeur_${email}_journal`, JSON.stringify([]));

        try {
          await sb.from('patients').upsert({
            email: email,
            name: name,
            registered_at: new Date().toISOString(),
            last_seen: new Date().toISOString()
          });
        } catch (err) {
          console.log('Supabase sync error:', err);
        }

        showSuccess('✓ Compte créé ! Redirection...');
        setTimeout(() => {
          window.location.href = 'index.html';
        }, 1000);
      } else {
        showError('Merci de remplir tous les champs correctement.');
      }
    });

    function showError(msg) {
      errorMsg.textContent = msg;
      errorMsg.classList.add('show');
    }

    function showSuccess(msg) {
      successMsg.textContent = msg;
      successMsg.classList.add('show');
    }

    function hideMessages() {
      errorMsg.classList.remove('show');
      successMsg.classList.remove('show');
    }
  </script>
</body>
</html>
