<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Connexion à V.A.L.E.U.R© — Accède à ton espace personnel">
  <title>Connexion — V.A.L.E.U.R©</title>
  
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  
  <!-- Premium Design System -->
  <link rel="stylesheet" href="assets/styles-premium.css">
  
  <!-- React -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <style>
    .auth-container {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: var(--space-lg);
      background: 
        radial-gradient(circle at 20% 50%, rgba(201, 168, 76, 0.08) 0%, transparent 50%),
        radial-gradient(circle at 80% 80%, rgba(201, 168, 76, 0.08) 0%, transparent 50%),
        var(--navy);
      position: relative;
    }

    .auth-container::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-image: 
        linear-gradient(rgba(201, 168, 76, 0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(201, 168, 76, 0.03) 1px, transparent 1px);
      background-size: 50px 50px;
      opacity: 0.5;
    }

    .auth-card {
      background: linear-gradient(135deg, var(--navy-card), var(--navy-mid));
      border: 1px solid rgba(201, 168, 76, 0.2);
      border-radius: var(--radius-xl);
      padding: var(--space-3xl);
      max-width: 480px;
      width: 100%;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
      position: relative;
      z-index: 1;
    }

    .auth-header {
      text-align: center;
      margin-bottom: var(--space-2xl);
    }

    .auth-logo {
      font-family: var(--font-serif);
      font-size: 36px;
      font-weight: 700;
      color: var(--gold);
      letter-spacing: 3px;
      text-shadow: 0 0 30px var(--gold-glow);
      margin-bottom: var(--space-md);
    }

    .auth-subtitle {
      font-size: var(--text-base);
      color: var(--text-muted);
      line-height: 1.6;
    }

    .form-group {
      margin-bottom: var(--space-lg);
    }

    .form-label {
      display: block;
      font-size: var(--text-sm);
      font-weight: 600;
      color: var(--text-light);
      margin-bottom: var(--space-sm);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .form-input {
      width: 100%;
      padding: 14px 20px;
      background: rgba(26, 34, 53, 0.6);
      border: 1px solid var(--navy-border);
      border-radius: var(--radius-md);
      color: var(--text-light);
      font-size: var(--text-base);
      font-family: var(--font-sans);
      transition: all var(--transition-base);
    }

    .form-input:focus {
      outline: none;
      border-color: var(--gold);
      background: rgba(26, 34, 53, 0.8);
      box-shadow: 0 0 0 3px rgba(201, 168, 76, 0.1);
    }

    .form-input::placeholder {
      color: var(--text-dimmed);
    }

    .form-error {
      margin-top: var(--space-sm);
      padding: var(--space-sm) var(--space-md);
      background: rgba(231, 76, 60, 0.1);
      border: 1px solid rgba(231, 76, 60, 0.3);
      border-radius: var(--radius-sm);
      color: var(--rouge);
      font-size: var(--text-sm);
      display: flex;
      align-items: center;
      gap: var(--space-sm);
    }

    .tab-buttons {
      display: flex;
      gap: var(--space-sm);
      margin-bottom: var(--space-xl);
      background: rgba(26, 34, 53, 0.6);
      padding: 6px;
      border-radius: var(--radius-xl);
    }

    .tab-button {
      flex: 1;
      padding: 12px;
      background: transparent;
      border: none;
      color: var(--text-muted);
      font-size: var(--text-base);
      font-weight: 600;
      cursor: pointer;
      border-radius: var(--radius-lg);
      transition: all var(--transition-base);
    }

    .tab-button.active {
      background: linear-gradient(135deg, var(--gold), var(--gold-dark));
      color: #000;
      box-shadow: 0 4px 12px rgba(201, 168, 76, 0.3);
    }

    .auth-footer {
      margin-top: var(--space-xl);
      padding-top: var(--space-xl);
      border-top: 1px solid var(--navy-border);
      text-align: center;
    }

    .auth-link {
      color: var(--text-muted);
      font-size: var(--text-sm);
    }

    .auth-link a {
      color: var(--gold);
      font-weight: 600;
      text-decoration: none;
      transition: color var(--transition-fast);
    }

    .auth-link a:hover {
      color: var(--gold-light);
    }

    @media (max-width: 576px) {
      .auth-card {
        padding: var(--space-xl);
      }

      .auth-logo {
        font-size: 28px;
      }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    function LoginPage() {
      const [mode, setMode] = useState('login'); // 'login' or 'register'
      const [email, setEmail] = useState('');
      const [name, setName] = useState('');
      const [error, setError] = useState('');

      useEffect(() => {
        // Si déjà connecté, rediriger
        const currentUser = localStorage.getItem('valeur_current_user');
        if (currentUser) {
          window.location.href = 'index.html';
        }
      }, []);

      const validateEmail = (email) => {
        return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
      };

      const handleSubmit = (e) => {
        e.preventDefault();
        setError('');

        // Validation
        if (!email.trim()) {
          setError('L\'email est requis');
          return;
        }

        if (!validateEmail(email)) {
          setError('Email invalide');
          return;
        }

        if (mode === 'register' && !name.trim()) {
          setError('Le prénom est requis');
          return;
        }

        const normalizedEmail = email.toLowerCase().trim();

        if (mode === 'login') {
          // Vérifier si l'utilisateur existe
          const userExists = localStorage.getItem(`valeur_${normalizedEmail}_name`);
          if (!userExists) {
            setError('Compte introuvable. Créez un compte d\'abord.');
            return;
          }

          // Connexion réussie
          localStorage.setItem('valeur_current_user', normalizedEmail);
          window.location.href = 'index.html';
        } else {
          // Inscription
          const userExists = localStorage.getItem(`valeur_${normalizedEmail}_name`);
          if (userExists) {
            setError('Un compte existe déjà avec cet email');
            return;
          }

          // Créer le compte
          localStorage.setItem(`valeur_${normalizedEmail}_name`, name.trim());
          localStorage.setItem(`valeur_${normalizedEmail}_progress`, JSON.stringify({
            completed: [],
            current: 0,
            createdAt: new Date().toISOString()
          }));
          localStorage.setItem('valeur_current_user', normalizedEmail);
          
          window.location.href = 'index.html';
        }
      };

      return (
        <div className="auth-container">
          <div className="auth-card animate-scale-in">
            <div className="auth-header">
              <div className="auth-logo">V.A.L.E.U.R©</div>
              <p className="auth-subtitle">
                {mode === 'login' 
                  ? 'Bon retour parmi nous' 
                  : 'Commence ton voyage de transformation'}
              </p>
            </div>

            <div className="tab-buttons">
              <button 
                className={`tab-button ${mode === 'login' ? 'active' : ''}`}
                onClick={() => {
                  setMode('login');
                  setError('');
                }}
              >
                Connexion
              </button>
              <button 
                className={`tab-button ${mode === 'register' ? 'active' : ''}`}
                onClick={() => {
                  setMode('register');
                  setError('');
                }}
              >
                Inscription
              </button>
            </div>

            <form onSubmit={handleSubmit}>
              {mode === 'register' && (
                <div className="form-group">
                  <label className="form-label">Prénom</label>
                  <input 
                    type="text"
                    className="form-input"
                    placeholder="Ton prénom"
                    value={name}
                    onChange={(e) => setName(e.target.value)}
                  />
                </div>
              )}

              <div className="form-group">
                <label className="form-label">Email</label>
                <input 
                  type="email"
                  className="form-input"
                  placeholder="ton@email.com"
                  value={email}
                  onChange={(e) => setEmail(e.target.value)}
                />
              </div>

              {error && (
                <div className="form-error">
                  <span>⚠</span>
                  <span>{error}</span>
                </div>
              )}

              <button type="submit" className="btn btn-primary btn-block btn-lg" style={{ marginTop: 'var(--space-xl)' }}>
                {mode === 'login' ? 'Se connecter' : 'Créer mon compte'} →
              </button>
            </form>

            <div className="auth-footer">
              <p className="auth-link">
                {mode === 'login' 
                  ? <>Pas encore de compte ? <a href="#" onClick={(e) => { e.preventDefault(); setMode('register'); setError(''); }}>S'inscrire</a></>
                  : <>Déjà inscrit ? <a href="#" onClick={(e) => { e.preventDefault(); setMode('login'); setError(''); }}>Se connecter</a></>
                }
              </p>
            </div>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<LoginPage />);
  </script>
</body>
</html>
