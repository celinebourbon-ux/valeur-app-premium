<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Module 0 : Comprendre — Introduction à la méthode V.A.L.E.U.R©">
  <title>Module 0 : Comprendre — V.A.L.E.U.R©</title>
  
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  
  <!-- Premium Design System -->
  <link rel="stylesheet" href="assets/styles-premium.css">
  
  <!-- React -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <style>
    /* Styles spécifiques aux modules */
    .module-header {
      background: rgba(10, 15, 26, 0.95);
      backdrop-filter: blur(24px);
      border-bottom: 1px solid rgba(201, 168, 76, 0.15);
      padding: 20px 0;
      position: sticky;
      top: 0;
      z-index: var(--z-sticky);
    }

    .header-content {
      max-width: 900px;
      margin: 0 auto;
      padding: 0 var(--space-lg);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .module-badge {
      font-family: var(--font-serif);
      font-size: var(--text-lg);
      font-weight: 700;
      color: var(--gold);
      letter-spacing: 1px;
    }

    .progress-section {
      background: var(--navy-mid);
      border-bottom: 1px solid rgba(201, 168, 76, 0.15);
      padding: var(--space-md) 0;
    }

    .progress-content {
      max-width: 900px;
      margin: 0 auto;
      padding: 0 var(--space-lg);
    }

    .progress-label {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: var(--text-sm);
      color: var(--text-muted);
      margin-bottom: var(--space-sm);
    }

    .progress-percent {
      color: var(--gold);
      font-weight: 700;
    }

    .progress-bar {
      height: 8px;
      background: rgba(201, 168, 76, 0.1);
      border-radius: var(--radius-full);
      overflow: hidden;
      position: relative;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--gold), var(--gold-light));
      transition: width var(--transition-smooth);
      box-shadow: 0 0 10px var(--gold-glow);
    }

    .module-content {
      max-width: 900px;
      margin: 0 auto;
      padding: var(--space-3xl) var(--space-lg) 140px;
    }

    .hero-section {
      text-align: center;
      margin-bottom: var(--space-3xl);
    }

    .hero-label {
      display: inline-block;
      background: linear-gradient(135deg, rgba(201, 168, 76, 0.15), rgba(201, 168, 76, 0.05));
      border: 1px solid rgba(201, 168, 76, 0.4);
      border-radius: var(--radius-full);
      padding: 10px 24px;
      font-size: var(--text-sm);
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: var(--space-xl);
    }

    .hero-title {
      font-size: clamp(40px, 7vw, 64px);
      margin-bottom: var(--space-lg);
      color: var(--cream);
      line-height: 1.1;
    }

    .hero-description {
      font-size: var(--text-xl);
      color: var(--text-muted);
      line-height: 1.7;
      max-width: 700px;
      margin: 0 auto;
    }

    .content-section {
      margin-bottom: var(--space-3xl);
    }

    .section-title {
      font-size: 36px;
      margin-bottom: var(--space-xl);
      display: flex;
      align-items: center;
      gap: var(--space-md);
    }

    .section-title::before {
      content: '';
      width: 4px;
      height: 36px;
      background: linear-gradient(180deg, var(--gold), transparent);
      border-radius: 2px;
    }

    .text-block {
      font-size: var(--text-lg);
      line-height: 1.8;
      color: var(--text-light);
      margin-bottom: var(--space-lg);
    }

    .highlight-box {
      background: linear-gradient(135deg, rgba(201, 168, 76, 0.12), rgba(26, 34, 53, 0.8));
      border-left: 4px solid var(--gold);
      border-radius: var(--radius-md);
      padding: var(--space-xl);
      margin: var(--space-2xl) 0;
      position: relative;
      overflow: hidden;
    }

    .highlight-box::before {
      content: '💡';
      position: absolute;
      top: var(--space-lg);
      right: var(--space-lg);
      font-size: 48px;
      opacity: 0.15;
    }

    .highlight-box p {
      font-size: var(--text-lg);
      line-height: 1.7;
      color: var(--text-light);
      position: relative;
      margin-bottom: 0;
    }

    .quote-section {
      text-align: center;
      font-size: var(--text-2xl);
      font-style: italic;
      color: var(--gold-light);
      margin: var(--space-3xl) 0;
      line-height: 1.6;
      font-family: var(--font-serif);
    }

    .masque-list {
      display: grid;
      gap: var(--space-md);
    }

    .masque-item {
      background: var(--navy-card);
      border: 1px solid var(--navy-border);
      border-radius: var(--radius-md);
      padding: var(--space-lg);
      transition: all var(--transition-base);
      border-left: 4px solid var(--masque-color);
    }

    .masque-item:hover {
      border-color: var(--masque-color);
      transform: translateX(8px);
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.3);
    }

    .masque-item h4 {
      font-size: var(--text-xl);
      margin-bottom: var(--space-sm);
      color: var(--masque-color);
      display: flex;
      align-items: center;
      gap: var(--space-sm);
    }

    .masque-item p {
      font-size: var(--text-base);
      color: var(--text-muted);
      line-height: 1.6;
      margin-bottom: 0;
    }

    .footer-nav {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: rgba(10, 15, 26, 0.95);
      backdrop-filter: blur(24px);
      border-top: 1px solid rgba(201, 168, 76, 0.15);
      padding: var(--space-lg);
      z-index: var(--z-sticky);
    }

    .footer-content {
      max-width: 900px;
      margin: 0 auto;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: var(--space-md);
    }

    @media (max-width: 768px) {
      .header-content,
      .progress-content,
      .module-content,
      .footer-content {
        padding-left: var(--space-md);
        padding-right: var(--space-md);
      }

      .module-content {
        padding-bottom: 160px;
      }

      .footer-content {
        flex-direction: column;
      }

      .section-title {
        font-size: 28px;
      }

      .section-title::before {
        height: 28px;
      }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    function Module0() {
      const [progress, setProgress] = useState(0);
      const [user, setUser] = useState(null);

      useEffect(() => {
        const email = localStorage.getItem('valeur_current_user');
        if (!email) {
          window.location.href = 'login.html';
          return;
        }
        setUser({ email });

        // Track scroll progress
        const handleScroll = () => {
          const docHeight = document.documentElement.scrollHeight - window.innerHeight;
          const scrolled = window.scrollY;
          const percent = Math.min((scrolled / docHeight) * 100, 100);
          setProgress(percent);
        };

        window.addEventListener('scroll', handleScroll);
        return () => window.removeEventListener('scroll', handleScroll);
      }, []);

      const handleComplete = () => {
        if (!user) return;

        const savedProgress = JSON.parse(localStorage.getItem(`valeur_${user.email}_progress`) || '{}');
        const completed = savedProgress.completed || [];
        
        if (!completed.includes(0)) {
          completed.push(0);
          const newProgress = {
            ...savedProgress,
            completed,
            current: Math.max(savedProgress.current || 0, 1),
            lastActivity: new Date().toISOString()
          };
          localStorage.setItem(`valeur_${user.email}_progress`, JSON.stringify(newProgress));
        }

        window.location.href = 'index.html';
      };

      const goBack = () => {
        window.location.href = 'index.html';
      };

      return (
        <>
          <header className="module-header">
            <div className="header-content">
              <button className="btn btn-ghost btn-sm" onClick={goBack}>
                ← Dashboard
              </button>
              <div className="module-badge">MODULE 0</div>
            </div>
          </header>

          <div className="progress-section">
            <div className="progress-content">
              <div className="progress-label">
                <span>Progression du module</span>
                <span className="progress-percent">{Math.round(progress)}%</span>
              </div>
              <div className="progress-bar">
                <div className="progress-fill" style={{ width: `${progress}%` }}></div>
              </div>
            </div>
          </div>

          <main className="module-content">
            <div className="hero-section animate-slide-up">
              <div className="hero-label">Module 0 : Introduction</div>
              <h1 className="hero-title">Comprendre</h1>
              <p className="hero-description">
                Bienvenue dans la méthode V.A.L.E.U.R©. Tu es sur le point de découvrir pourquoi tu as développé l'anxiété, et comment t'en libérer définitivement.
              </p>
            </div>

            <div className="content-section animate-slide-up stagger-1">
              <h2 className="section-title">L'anxiété n'est pas une maladie</h2>
              <p className="text-block">
                <strong>Répète-toi cela :</strong> L'anxiété n'est pas une maladie. Ce n'est pas un dysfonctionnement de ton cerveau. Ce n'est pas "qui tu es". C'est une <strong>protection que ton cerveau a mise en place</strong> pour te protéger d'une peur profonde.
              </p>
              <p className="text-block">
                Cette peur, tu l'as vécue très tôt. Peut-être dans l'enfance. Peut-être même avant. Et ton cerveau, pour que tu ne souffres pas, a construit un <strong>masque protecteur</strong>. Un système de défense sophistiqué.
              </p>
            </div>

            <div className="highlight-box animate-slide-up stagger-2">
              <p>
                <strong>Clé n°1 :</strong> L'anxiété est la conséquence d'un masque que tu portes pour te protéger d'une peur oubliée. En enlevant le masque, l'anxiété disparaît.
              </p>
            </div>

            <div className="content-section animate-slide-up stagger-3">
              <h2 className="section-title">Les 7 peurs universelles</h2>
              <p className="text-block">
                Après 15 ans de pratique clinique avec des centaines de patients, j'ai identifié <strong>7 peurs fondamentales</strong> qui expliquent 90% des troubles anxieux. Chaque peur correspond à un masque protecteur.
              </p>
            </div>

            <div className="masque-list">
              <div className="masque-item" style={{ '--masque-color': 'var(--rouge)' }}>
                <h4>🔴 Masque Rouge : Peur de la mort</h4>
                <p>Tu as peur que quelque chose d'irréversible arrive. Crises d'angoisse, hypocondrie, peur de perdre le contrôle.</p>
              </div>

              <div className="masque-item" style={{ '--masque-color': 'var(--orange)' }}>
                <h4>🟠 Masque Orange : Peur du conflit</h4>
                <p>Tu évites les confrontations. Tu te tais pour ne pas déplaire. Anxiété sociale, peur du jugement.</p>
              </div>

              <div className="masque-item" style={{ '--masque-color': 'var(--jaune)' }}>
                <h4>🟡 Masque Jaune : Peur de l'abandon</h4>
                <p>Tu as peur d'être laissé·e seul·e. Tu donnes trop, tu t'oublies. Anxiété d'attachement, dépendance affective.</p>
              </div>

              <div className="masque-item" style={{ '--masque-color': 'var(--vert)' }}>
                <h4>🟢 Masque Vert : Peur de la transgression</h4>
                <p>Tu as peur de faire quelque chose de mal. Tu te sens coupable. TOC, ruminations, perfectionnisme moral.</p>
              </div>

              <div className="masque-item" style={{ '--masque-color': 'var(--bleu)' }}>
                <h4>🔵 Masque Bleu : Peur de l'impuissance</h4>
                <p>Tu as peur de ne pas y arriver. Tu anticipes l'échec. Procrastination, découragement chronique.</p>
              </div>

              <div className="masque-item" style={{ '--masque-color': 'var(--indigo)' }}>
                <h4>🟣 Masque Indigo : Peur de l'imperfection</h4>
                <p>Tu as peur de ne jamais être assez bien. Syndrome de l'imposteur, perfectionnisme paralysant.</p>
              </div>

              <div className="masque-item" style={{ '--masque-color': 'var(--violet)' }}>
                <h4>🟣 Masque Violet : Peur de l'existence</h4>
                <p>Tu remets en question le sens de tout. Anxiété existentielle, déréalisation, questionnements métaphysiques.</p>
              </div>
            </div>

            <p className="quote-section">
              "Ton anxiété protège ce qui compte le plus pour toi."
            </p>

            <div className="content-section">
              <h2 className="section-title">Le chemin vers la libération</h2>
              <p className="text-block">
                Dans les modules suivants, tu vas :
              </p>
              <p className="text-block">
                <strong>1. Identifier ton masque dominant</strong> (Module 2-3)<br>
                <strong>2. Comprendre ton mécanisme de protection</strong> (Module 1)<br>
                <strong>3. Développer la conscience observatrice</strong> (Module 4)<br>
                <strong>4. Réconcilier peur et valeur</strong> (Module 5)<br>
                <strong>5. Ancrer la transformation</strong> (Module 6)
              </p>
            </div>

            <div className="highlight-box">
              <p>
                <strong>Engage-toi maintenant :</strong> Les 90 prochains jours vont changer ta vie. Pas besoin de violence. Pas besoin de forcing. Juste une compréhension profonde et une transformation progressive.
              </p>
            </div>
          </main>

          <nav className="footer-nav">
            <div className="footer-content">
              <button className="btn btn-secondary" onClick={goBack}>
                ← Dashboard
              </button>
              <button className="btn btn-primary btn-lg" onClick={handleComplete}>
                Terminer le module ✓
              </button>
            </div>
          </nav>
        </>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<Module0 />);
  </script>
</body>
</html>
