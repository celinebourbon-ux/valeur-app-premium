<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Programme unique pour se libérer de l'anxiété en 90 jours. Méthode V.A.L.E.U.R© — De la peur à la joie d'être soi">
  <title>V.A.L.E.U.R© — Se libérer des 7 peurs qui empêchent d'être soi</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --navy: #0a0f1a;
      --navy-mid: #111827;
      --navy-card: #1a2235;
      --navy-border: #2a3650;
      --gold: #c9a84c;
      --gold-dark: #a07830;
      --gold-light: #e8d08c;
      --cream: #f7f3ee;
      --text-light: #e2e8f0;
      --text-muted: #94a3b8;
      --rouge: #E74C3C;
      --orange: #E67E22;
      --jaune: #F1C40F;
      --vert: #2ECC71;
      --bleu: #3498DB;
      --indigo: #8E44AD;
      --violet: #9B59B6;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--navy);
      color: var(--text-light);
      line-height: 1.6;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }

    h1, h2, h3 {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-weight: 700;
      line-height: 1.15;
    }

    /* Suite du CSS original... (tronqué pour la brièveté) */
    
    .hero {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 160px 24px 120px;
      position: relative;
    }

    .hero-h1 {
      font-size: clamp(42px, 9vw, 84px);
      color: var(--cream);
      margin-bottom: 32px;
      line-height: 1.1;
      font-weight: 700;
      letter-spacing: -1px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 16px 40px;
      border-radius: 50px;
      font-weight: 700;
      font-size: 17px;
      text-decoration: none !important;
      transition: all 0.3s ease;
      cursor: pointer;
      border: none;
    }

    .btn-gold {
      background: linear-gradient(135deg, var(--gold), var(--gold-dark));
      color: #000 !important;
      box-shadow: 0 8px 32px rgba(201, 168, 76, 0.4);
      text-decoration: none !important;
      font-weight: 800;
      letter-spacing: 0.5px;
    }

    .btn-gold:hover {
      transform: translateY(-3px) scale(1.02);
      box-shadow: 0 12px 48px rgba(201, 168, 76, 0.6);
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 24px;
    }

    .text-center {
      text-align: center;
    }
  </style>
</head>
<body>
  <header class="hero">
    <div class="container text-center">
      <h1 class="hero-h1">
        L'anxiété n'est pas <span style="color:var(--gold)">une maladie</span>.<br>
        C'est une <span style="color:var(--gold)">protection</span> que tu peux désactiver.
      </h1>
      <p style="font-size:20px;color:var(--text-muted);margin-bottom:48px;">
        <strong>Programme transformateur en 90 jours.</strong><br>
        Découvre la méthode V.A.L.E.U.R© et retrouve la joie d'être toi-même.
      </p>
      <div style="display:flex;gap:20px;justify-content:center;flex-wrap:wrap;">
        <a href="/valeur-app-premium/index.html" class="btn btn-gold">
          Accéder à l'application →
        </a>
        <a href="https://celinebourbon-ux.github.io/Questionnaire-Valeur-V4/" class="btn btn-gold" target="_blank">
          Passer le test gratuit
        </a>
      </div>
    </div>
  </header>
</body>
</html>
