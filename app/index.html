<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard — V.A.L.E.U.R©</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root {
      --navy: #0a0f1a;
      --navy-mid: #111827;
      --navy-card: #1a2235;
      --navy-border: #2a3650;
      --gold: #c9a84c;
      --gold-dark: #a07830;
      --gold-light: #e8d08c;
      --cream: #f7f3ee;
      --text-light: #e2e8f0;
      --text-muted: #94a3b8;
      --rouge: #E74C3C;
      --orange: #E67E22;
      --jaune: #F1C40F;
      --vert: #2ECC71;
      --bleu: #3498DB;
      --indigo: #8E44AD;
      --violet: #9B59B6;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--navy);
      color: var(--text-light);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    h1, h2, h3 {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-weight: 700;
      line-height: 1.2;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .header {
      background: rgba(10, 15, 26, 0.95);
      backdrop-filter: blur(24px);
      border-bottom: 1px solid rgba(201, 168, 76, 0.15);
      padding: 20px 24px;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .header-inner {
      max-width: 1200px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .logo {
      font-family: 'Cormorant Garamond', serif;
      font-size: 28px;
      font-weight: 700;
      color: var(--gold);
      letter-spacing: 2px;
      text-shadow: 0 0 20px rgba(201, 168, 76, 0.3);
    }

    .user-menu {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .user-avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--gold), var(--gold-dark));
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      color: #000;
      font-size: 16px;
    }

    .btn-logout {
      background: transparent;
      border: 1px solid rgba(201, 168, 76, 0.3);
      color: var(--text-muted);
      padding: 8px 16px;
      border-radius: 20px;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.3s;
    }

    .btn-logout:hover {
      border-color: var(--gold);
      color: var(--gold);
    }

    .progress-header {
      background: var(--navy-mid);
      border-bottom: 1px solid rgba(201, 168, 76, 0.15);
      padding: 16px 24px;
    }

    .progress-inner {
      max-width: 1200px;
      margin: 0 auto;
    }

    .progress-label {
      display: flex;
      justify-content: space-between;
      font-size: 13px;
      color: var(--text-muted);
      margin-bottom: 8px;
    }

    .progress-percent {
      color: var(--gold);
      font-weight: 700;
    }

    .progress-bar {
      height: 8px;
      background: rgba(201, 168, 76, 0.1);
      border-radius: 10px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--gold), var(--gold-light));
      transition: width 0.5s ease;
      box-shadow: 0 0 10px rgba(201, 168, 76, 0.5);
    }

    .main-content {
      max-width: 1200px;
      margin: 0 auto;
      padding: 48px 24px;
      animation: fadeIn 0.6s ease;
    }

    .welcome {
      margin-bottom: 48px;
      animation: slideUp 0.6s ease;
    }

    .welcome h1 {
      font-size: clamp(32px, 5vw, 48px);
      color: var(--cream);
      margin-bottom: 12px;
    }

    .welcome p {
      font-size: 18px;
      color: var(--text-muted);
      line-height: 1.6;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
      margin-bottom: 48px;
      animation: slideUp 0.6s ease 0.1s both;
    }

    .stat-card {
      background: linear-gradient(135deg, var(--navy-card), var(--navy-mid));
      border: 1px solid var(--navy-border);
      border-radius: 16px;
      padding: 24px;
      transition: all 0.3s;
    }

    .stat-card:hover {
      transform: translateY(-4px);
      border-color: var(--gold);
      box-shadow: 0 8px 24px rgba(201, 168, 76, 0.2);
    }

    .stat-label {
      font-size: 13px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 8px;
    }

    .stat-value {
      font-size: 36px;
      font-weight: 700;
      color: var(--gold);
      font-family: 'Cormorant Garamond', serif;
    }

    .section-title {
      font-size: 28px;
      margin-bottom: 24px;
      color: var(--cream);
      animation: slideUp 0.6s ease 0.2s both;
    }

    .modules-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 24px;
      margin-bottom: 48px;
      animation: slideUp 0.6s ease 0.3s both;
    }

    .module-card {
      background: linear-gradient(135deg, var(--navy-card), var(--navy-mid));
      border: 1px solid var(--navy-border);
      border-radius: 16px;
      padding: 28px;
      transition: all 0.3s;
      position: relative;
      overflow: hidden;
    }

    .module-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 4px;
      height: 100%;
      background: var(--module-color);
    }

    .module-card:not(.locked):hover {
      transform: translateY(-4px);
      border-color: var(--module-color);
      box-shadow: 0 12px 32px rgba(0, 0, 0, 0.4);
    }

    .module-card.locked {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .module-header {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 16px;
    }

    .module-number {
      width: 48px;
      height: 48px;
      border-radius: 12px;
      background: var(--module-color);
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 18px;
      flex-shrink: 0;
    }

    .module-info h3 {
      font-size: 20px;
      color: var(--cream);
      margin-bottom: 4px;
    }

    .module-duration {
      font-size: 13px;
      color: var(--text-muted);
    }

    .module-description {
      font-size: 15px;
      line-height: 1.6;
      color: var(--text-light);
      margin-bottom: 20px;
    }

    .module-status {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 16px;
    }

    .status-completed { color: var(--vert); }
    .status-available { color: var(--gold); }
    .status-locked { color: var(--text-muted); }

    .btn-module {
      width: 100%;
      background: linear-gradient(135deg, var(--gold), var(--gold-dark));
      color: #000;
      border: none;
      border-radius: 10px;
      padding: 12px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.3s;
    }

    .btn-module:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(201, 168, 76, 0.4);
    }

    .btn-module:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .journal-widget {
      background: linear-gradient(135deg, var(--navy-card), var(--navy-mid));
      border: 1px solid rgba(201, 168, 76, 0.2);
      border-radius: 16px;
      padding: 32px;
      text-align: center;
      animation: slideUp 0.6s ease 0.4s both;
    }

    .journal-widget h3 {
      font-size: 24px;
      margin-bottom: 12px;
      color: var(--gold);
    }

    .journal-widget p {
      font-size: 16px;
      color: var(--text-muted);
      margin-bottom: 24px;
      line-height: 1.6;
    }

    .btn-journal {
      background: transparent;
      border: 2px solid var(--gold);
      color: var(--gold);
      padding: 12px 32px;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.3s;
    }

    .btn-journal:hover {
      background: var(--gold);
      color: #000;
    }

    @media (max-width: 768px) {
      .modules-grid {
        grid-template-columns: 1fr;
      }

      .stats-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    const MODULES = [
      { id: 0, title: 'Comprendre', description: 'Découvre les bases de la méthode V.A.L.E.U.R©', duration: '20 min', color: 'var(--gold)', file: 'module-0.html' },
      { id: 1, title: 'Anxiété', description: 'Comprends les mécanismes de l’anxiété', duration: '25 min', color: 'var(--rouge)', file: 'module-1.html' },
      { id: 2, title: 'Masques', description: 'Identifie ton masque protecteur', duration: '30 min', color: 'var(--orange)', file: 'module-2.html' },
      { id: 3, title: 'Test', description: 'Passe le test des 7 masques', duration: '15 min', color: 'var(--jaune)', file: 'module-3.html' },
      { id: 4, title: 'Observer', description: 'Développe la conscience observatrice', duration: '35 min', color: 'var(--vert)', file: 'module-4.html' },
      { id: 5, title: 'Réconcilier', description: 'Harmonise peur et valeur', duration: '40 min', color: 'var(--bleu)', file: 'module-5.html' },
      { id: 6, title: 'Ancrer', description: 'Intègre la transformation', duration: '30 min', color: 'var(--violet)', file: 'module-6.html' },
    ];

    function Dashboard() {
      const [user, setUser] = useState(null);
      const [progress, setProgress] = useState({ completed: [], current: 0 });

      useEffect(() => {
        const email = localStorage.getItem('valeur_current_user');
        if (!email) {
          window.location.href = 'login.html';
          return;
        }

        const name = localStorage.getItem(`valeur_${email}_name`) || email.split('@')[0];
        const savedProgress = JSON.parse(localStorage.getItem(`valeur_${email}_progress`) || '{}');
        
        setUser({ email, name });
        setProgress({
          completed: savedProgress.completed || [],
          current: savedProgress.current || 0
        });
      }, []);

      const handleLogout = () => {
        localStorage.removeItem('valeur_current_user');
        window.location.href = 'login.html';
      };

      const openModule = (moduleId) => {
        const module = MODULES.find(m => m.id === moduleId);
        if (module) {
          window.location.href = module.file;
        }
      };

      if (!user) return null;

      const completedCount = progress.completed.length;
      const progressPercent = Math.round((completedCount / MODULES.length) * 100);

      return (
        <>
          <header className="header">
            <div className="header-inner">
              <div className="logo">V.A.L.E.U.R©</div>
              <div className="user-menu">
                <div className="user-avatar">{user.name[0].toUpperCase()}</div>
                <button className="btn-logout" onClick={handleLogout}>Déconnexion</button>
              </div>
            </div>
          </header>

          <div className="progress-header">
            <div className="progress-inner">
              <div className="progress-label">
                <span>Ta progression globale</span>
                <span className="progress-percent">{progressPercent}%</span>
              </div>
              <div className="progress-bar">
                <div className="progress-fill" style={{ width: `${progressPercent}%` }}></div>
              </div>
            </div>
          </div>

          <main className="main-content">
            <div className="welcome">
              <h1>Bienvenue {user.name} 🌿</h1>
              <p>Continue ton chemin vers la libération de ton anxiété. Chaque module te rapproche de ta vraie nature.</p>
            </div>

            <div className="stats-grid">
              <div className="stat-card">
                <div className="stat-label">Modules complétés</div>
                <div className="stat-value">{completedCount}/{MODULES.length}</div>
              </div>
              <div className="stat-card">
                <div className="stat-label">Progression</div>
                <div className="stat-value">{progressPercent}%</div>
              </div>
              <div className="stat-card">
                <div className="stat-label">Semaines actives</div>
                <div className="stat-value">1</div>
              </div>
              <div className="stat-card">
                <div className="stat-label">Modules restants</div>
                <div className="stat-value">{MODULES.length - completedCount}</div>
              </div>
            </div>

            <h2 className="section-title">Tes modules</h2>
            <div className="modules-grid">
              {MODULES.map((module, idx) => {
                const isCompleted = progress.completed.includes(module.id);
                const isAvailable = module.id === 0 || progress.completed.includes(module.id - 1);
                const isLocked = !isAvailable;

                return (
                  <div 
                    key={module.id} 
                    className={`module-card ${isLocked ? 'locked' : ''}`}
                    style={{ '--module-color': module.color }}
                  >
                    <div className="module-header">
                      <div className="module-number">M{module.id}</div>
                      <div className="module-info">
                        <h3>{module.title}</h3>
                        <div className="module-duration">{module.duration}</div>
                      </div>
                    </div>
                    <p className="module-description">{module.description}</p>
                    <div className={`module-status ${
                      isCompleted ? 'status-completed' : 
                      isAvailable ? 'status-available' : 
                      'status-locked'
                    }`}>
                      {isCompleted && <>✓ Terminé</>}
                      {!isCompleted && isAvailable && <>▶ Disponible</>}
                      {isLocked && <>🔒 Verrouillé</>}
                    </div>
                    <button 
                      className="btn-module"
                      onClick={() => openModule(module.id)}
                      disabled={isLocked}
                    >
                      {isCompleted ? 'Revoir' : 'Commencer'} →
                    </button>
                  </div>
                );
              })}
            </div>

            <div className="journal-widget">
              <h3>📖 Journal de bord</h3>
              <p>Tes réflexions quotidiennes t’aident à ancrer ta transformation</p>
              <button className="btn-journal">Ouvrir mon journal</button>
            </div>
          </main>
        </>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<Dashboard />);
  </script>
</body>
</html>
